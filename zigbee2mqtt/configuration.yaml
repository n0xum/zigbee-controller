homeassistant: false
permit_join: true
mqtt:
  base_topic: zigbee2mqtt
  server: mqtt://mosquitto
serial:
  port: /dev/ttyUSB0
  adapter: ezsp
advanced:
  log_level: info
  transmit_power: 20
frontend:
  enabled: true
  port: 8080
